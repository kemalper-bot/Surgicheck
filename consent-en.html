<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Informed Consent Form — SurgiCheck</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @media print {
      .no-print { display: none !important; }
      body { background: white !important; padding: 0 !important; }
      #consentDocument { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
      #consentDocument > div { box-shadow: none !important; border-radius: 0 !important; }
      .signature-canvas { border: 1px solid #374151 !important; background: white !important; }
      textarea { border: 1px solid #e2e8f0 !important; }
    }
    @page { margin: 1.2cm; }
    .signature-canvas {
      cursor: crosshair;
      touch-action: none;
      background: #f8fafc;
      border: 2px dashed #cbd5e1;
      border-radius: 6px;
      display: block;
    }
    .signature-canvas.has-sig {
      background: white;
      border: 2px solid #475569;
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">

<!-- AUTH OVERLAY -->
<div id="authOverlay" class="fixed inset-0 bg-slate-900/95 z-50 flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm mx-4">
    <div class="flex items-center gap-3 mb-6">
      <div class="w-10 h-10 bg-black rounded-xl flex items-center justify-center flex-shrink-0">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <div>
        <h1 class="font-bold text-slate-900">SurgiCheck</h1>
        <p class="text-xs text-slate-500">Consent Form System</p>
      </div>
    </div>
    <h2 class="text-base font-bold text-slate-800 mb-4">Clinician Login Required</h2>
    <div id="authError" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg p-3 text-sm mb-4"></div>
    <input type="email" id="authEmail" placeholder="Email" autocomplete="username"
      class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-black">
    <input type="password" id="authPassword" placeholder="Password" autocomplete="current-password"
      class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-black">
    <button id="loginBtn" class="w-full bg-black text-white rounded-lg py-2.5 text-sm font-bold hover:bg-slate-800 transition-colors">
      Sign In
    </button>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="hidden">

  <!-- TOP NAV -->
  <nav class="no-print bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between sticky top-0 z-10 shadow-sm">
    <div class="flex items-center gap-3">

          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>

        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
        </svg>
        Save Consent
      </button>
      <button id="printBtn" class="flex items-center gap-2 border border-slate-300 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-50 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m8-4V3H6v10m6 3v10a2 2 0 01-2 2H6a2 2 0 01-2-2V17"/>

  </nav>

  <!-- CASE LOOKUP -->

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
      <div class="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center mb-4">
        <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <h2 class="text-lg font-bold text-slate-800 mb-2">Generate Consent Form</h2>
      <p class="text-sm text-slate-500 mb-5">Enter the Case ID for which you want to generate a consent form.</p>

      <button id="loadCaseBtn" class="w-full bg-black text-white rounded-lg py-2.5 text-sm font-bold hover:bg-slate-800 transition-colors">
        Generate Form
      </button>
    </div>
  </div>

  <!-- LOADING -->
  <div id="loadingSection" class="hidden no-print flex items-center justify-center py-24">
    <div class="text-center">
      <div class="w-10 h-10 border-4 border-slate-200 border-t-black rounded-full animate-spin mx-auto mb-4"></div>
      <p class="text-slate-500 text-sm">Loading case...</p>
    </div>
  </div>

  <!-- ERROR -->
  <div id="errorSection" class="hidden no-print max-w-md mx-auto mt-16 px-4">
    <div class="bg-red-50 border border-red-200 rounded-2xl p-8 text-center">

      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>

  <!-- CONSENT DOCUMENT -->
  <div id="consentDocument" class="hidden max-w-3xl mx-auto my-8 px-4 pb-16"></div>

</div><!-- /mainApp -->

  let currentCase = null;
  let currentFlags = [];

  // ─── AUTH ─────────────────────────────────────────────────────────────────────
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("authOverlay").classList.add("hidden");
      document.getElementById("mainApp").classList.remove("hidden");
      const params = new URLSearchParams(window.location.search);
      const caseId = params.get("caseId");
      if (caseId) {
        loadCase(caseId);
      } else {
        document.getElementById("lookupSection").classList.remove("hidden");
      }
    }
  });

  document.getElementById("loginBtn").addEventListener("click", async () => {
    const email = document.getElementById("authEmail").value.trim();
    const password = document.getElementById("authPassword").value;
    const btn = document.getElementById("loginBtn");
    const errEl = document.getElementById("authError");
    btn.textContent = "Signing in...";
    btn.disabled = true;
    errEl.classList.add("hidden");
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (e) {
      errEl.textContent = e.code === "auth/invalid-credential" ? "Incorrect email or password." : e.message;
      errEl.classList.remove("hidden");
      btn.textContent = "Sign In";
      btn.disabled = false;
    }
  });

  document.getElementById("authPassword").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("loginBtn").click();
  });

  // ─── CASE LOADING ─────────────────────────────────────────────────────────────
  document.getElementById("loadCaseBtn").addEventListener("click", () => {
    const id = document.getElementById("caseIdInput").value.trim();
    if (id) loadCase(id);
  });
  document.getElementById("caseIdInput").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("loadCaseBtn").click();
  });
  document.getElementById("retryBtn").addEventListener("click", () => {
    document.getElementById("errorSection").classList.add("hidden");
    document.getElementById("lookupSection").classList.remove("hidden");
  });

  async function loadCase(caseId) {
    document.getElementById("lookupSection").classList.add("hidden");
    document.getElementById("errorSection").classList.add("hidden");
    document.getElementById("consentDocument").classList.add("hidden");
    document.getElementById("navButtons").classList.add("hidden");
    document.getElementById("loadingSection").classList.remove("hidden");
    try {
      const snap = await getDoc(doc(db, "cases", caseId));
      if (!snap.exists()) throw new Error("No case found with the given ID.");
      currentCase = { id: caseId, ...snap.data() };
      currentFlags = computeFlags(currentCase);
      document.getElementById("loadingSection").classList.add("hidden");
      renderConsentForm();
      document.getElementById("consentDocument").classList.remove("hidden");
      document.getElementById("navButtons").classList.remove("hidden");
    } catch (e) {
      document.getElementById("loadingSection").classList.add("hidden");
      document.getElementById("errorMsg").textContent = e.message || "An error occurred while loading the case.";
      document.getElementById("errorSection").classList.remove("hidden");
    }
  }

    const flags = [];
    try {
      const r = caseData?.risks ?? {};
      const bmi = overrides.bmi ?? caseData?.anthropometrics?.bmi ?? null;
      const proc = caseData?.procedure?.name ?? "";
      const asa = overrides.asa ?? caseData?.clinician?.asa ?? null;
      const smokingCV = overrides.smokingVerified ?? caseData?.clinician?.smokingVerified ?? null;
      const anticoagCV = overrides.anticoagVerified ?? caseData?.clinician?.anticoagVerified ?? null;

      if (asa === "4") flags.push({ type: "HARD", key: "asa4" });
      if (r.activeMalignancy) flags.push({ type: "HARD", key: "malignancy" });
      if (r.dvt) flags.push({ type: "HARD", key: "dvt" });
      if (anticoagCV === "active") {
        flags.push({ type: "HARD", key: "anticoag_active" });
      } else if (!anticoagCV && (r.medBloodThinners || r.anticoagulant)) {
        flags.push({ type: "VERIFY", key: "anticoag_verify" });
      }
      if (r.medGlp1) flags.push({ type: "HARD", key: "med_glp1" });
      if (r.medSglt2) flags.push({ type: "HARD", key: "med_sglt2" });
      if (r.sickleCell) flags.push({ type: "HARD", key: "sickle_cell" });
      if (r.anestheticReaction) flags.push({ type: "HARD", key: "anesthetic_reaction" });

      const highBmiProcs = ["Tummy Tuck", "BBL", "Liposuction", "Meme Küçültme"];
      const isHBP = highBmiProcs.some(p => proc.includes(p));
      if (bmi !== null) {
        if (bmi >= 40 && isHBP) flags.push({ type: "HARD", key: "bmi40" });
        else if (bmi >= 35 && isHBP) flags.push({ type: "SOFT", key: "bmi35" });
      }

      if (r.medOcp) {
        const highDvtProcs = ["Tummy Tuck", "BBL", "Liposuction", "Breast Lift", "Meme Küçültme"];
        if (highDvtProcs.some(p => proc.includes(p))) {
          flags.push({ type: "SOFT", key: "med_ocp_dvt" });
        } else {
          flags.push({ type: "SOFT", key: "med_ocp" });
        }
      }

      if (smokingCV === "active") {
        flags.push({ type: "SOFT", key: "smoking_active" });
      } else if (!smokingCV && r.smoking === "active") {
        flags.push({ type: "SOFT", key: "smoking_active" });
      }

      if (r.medAcne) flags.push({ type: "SOFT", key: "med_acne" });
      if (r.medPsych) flags.push({ type: "SOFT", key: "med_psych" });
      if (r.medSteroid) flags.push({ type: "VERIFY", key: "med_steroid" });
      if (r.medNsaid) flags.push({ type: "SOFT", key: "med_nsaid" });
      if (r.medSupplements) flags.push({ type: "VERIFY", key: "med_supplements" });
      if (r.keloid) flags.push({ type: "SOFT", key: "keloid" });
      if (r.csection && proc === "Tummy Tuck") flags.push({ type: "SOFT", key: "csection" });
      if (caseData?.procedure?.revision) flags.push({ type: "SOFT", key: "revision" });
      if (r.hiv) flags.push({ type: "VERIFY", key: "hiv" });
      if (r.hepatitis) flags.push({ type: "VERIFY", key: "hepatitis" });
      if (r.heartMurmur) flags.push({ type: "VERIFY", key: "heart_murmur" });
      if (r.shortnessOfBreath) flags.push({ type: "VERIFY", key: "shortness_of_breath" });
      if (r.thalassemia) flags.push({ type: "VERIFY", key: "thalassemia" });
      if (r.anemia) flags.push({ type: "VERIFY", key: "anemia" });
      if (r.asthma) flags.push({ type: "SOFT", key: "asthma" });
      if (r.thyroid) flags.push({ type: "SOFT", key: "thyroid" });
      if (r.psychiatricDisorder) flags.push({ type: "SOFT", key: "psych_disorder" });
      if (r.sickleCellTrait) flags.push({ type: "SOFT", key: "sickle_cell_trait" });
      if (r.bloodTransfusion) flags.push({ type: "SOFT", key: "blood_transfusion" });
      if (r.medAllergy) flags.push({ type: "VERIFY", key: "med_allergy" });
    } catch (e) {}
    return flags;
  }

  // ─── SIGNATURE CANVAS ─────────────────────────────────────────────────────────
  function initCanvas(canvasId) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    canvas.width = canvas.offsetWidth || 600;
    const ctx = canvas.getContext("2d");
    ctx.strokeStyle = "#1e293b";
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    let drawing = false, lastX = 0, lastY = 0;

    function getPos(e) {
      const r = canvas.getBoundingClientRect();
      const sx = canvas.width / r.width, sy = canvas.height / r.height;
      const src = e.touches ? e.touches[0] : e;
      return { x: (src.clientX - r.left) * sx, y: (src.clientY - r.top) * sy };
    }

    canvas.addEventListener("mousedown", e => {
      drawing = true; const p = getPos(e); lastX = p.x; lastY = p.y;
      canvas.classList.add("has-sig");
    });
    canvas.addEventListener("mousemove", e => {
      if (!drawing) return;
      const p = getPos(e);
      ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke();
      lastX = p.x; lastY = p.y;
    });
    canvas.addEventListener("mouseup", () => { drawing = false; });
    canvas.addEventListener("mouseleave", () => { drawing = false; });

    canvas.addEventListener("touchstart", e => {
      e.preventDefault(); drawing = true;
      const p = getPos(e); lastX = p.x; lastY = p.y;
      canvas.classList.add("has-sig");
    }, { passive: false });
    canvas.addEventListener("touchmove", e => {
      e.preventDefault();
      if (!drawing) return;
      const p = getPos(e);
      ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke();
      lastX = p.x; lastY = p.y;
    }, { passive: false });
    canvas.addEventListener("touchend", () => { drawing = false; });
  }

  function clearCanvas(canvasId) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
    canvas.classList.remove("has-sig");
  }

  // ─── SAVE CONSENT ─────────────────────────────────────────────────────────────
  document.getElementById("saveConsentBtn").addEventListener("click", async () => {
    if (!currentCase) return;
    const btn = document.getElementById("saveConsentBtn");

    const patientName = document.getElementById("patientNameSig")?.value.trim();
    const clinicianName = document.getElementById("clinicianNameSig")?.value.trim();
    if (!patientName) { alert("Please enter the patient's full name."); return; }
    if (!clinicianName) { alert("Please enter the clinician's full name."); return; }

    const ackItems = document.querySelectorAll("#acknowledgmentList input[type=checkbox]");
    const unchecked = Array.from(ackItems).filter(cb => !cb.checked);
    if (unchecked.length > 0) {
      alert("Please acknowledge all items requiring individual consent.");
      return;
    }

    const acknowledgedLabels = Array.from(ackItems).map(cb => cb.dataset.label);
    const patientSig = document.getElementById("patientSigCanvas")?.toDataURL("image/png") ?? null;
    const clinicianSig = document.getElementById("clinicianSigCanvas")?.toDataURL("image/png") ?? null;
    const notes = document.getElementById("patientNotes")?.value.trim() ?? "";

    const origHTML = btn.innerHTML;
    btn.textContent = "Saving...";
    btn.disabled = true;

    try {
      const consentRef = await addDoc(collection(db, "consents"), {
        caseId: currentCase.id,
        procedureName: currentCase.procedure?.name ?? "",
        patientName,
        patientNationalId: document.getElementById("patientIdNo")?.value.trim() ?? "",
        witnessName: document.getElementById("witnessName")?.value.trim() ?? "",
        clinicianName,
        diplomaNo: document.getElementById("diplomaNo")?.value.trim() ?? "",
        patientSignature: patientSig,
        clinicianSignature: clinicianSig,
        acknowledgedItems: acknowledgedLabels,
        patientNotes: notes,
        flagKeys: currentFlags.map(f => f.key),
        signedAt: serverTimestamp(),
        createdAt: serverTimestamp()
      });

      await updateDoc(doc(db, "cases", currentCase.id), {
        consentSigned: true,
        consentId: consentRef.id,
        updatedAt: serverTimestamp()
      });

      const toast = document.getElementById("successToast");
      toast.classList.remove("hidden");
      setTimeout(() => toast.classList.add("hidden"), 4000);

      btn.textContent = "✓ Saved";
      btn.classList.remove("bg-emerald-600", "hover:bg-emerald-700");
      btn.classList.add("bg-slate-400", "cursor-default");
    } catch (e) {
      alert("Save error: " + e.message);
      btn.innerHTML = origHTML;
      btn.disabled = false;
    }
  });

  document.getElementById("printBtn").addEventListener("click", () => window.print());

  // ─── UTILITY ──────────────────────────────────────────────────────────────────
  function esc(str) {
    if (!str) return "";
    return String(str)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }
