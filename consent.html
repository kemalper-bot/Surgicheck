<!DOCTYPE html>
<html lang="tr">
<head>

    @media print {
      .no-print { display: none !important; }

      #consentDocument > div { box-shadow: none !important; border-radius: 0 !important; }
      .signature-canvas { border: 1px solid #374151 !important; background: white !important; }
      textarea { border: 1px solid #e2e8f0 !important; }
    }
    @page { margin: 1.2cm; }
    .signature-canvas {
      cursor: crosshair;
      touch-action: none;
      background: #f8fafc;
      border: 2px dashed #cbd5e1;
      border-radius: 6px;
      display: block;
    }
    .signature-canvas.has-sig {
      background: white;
      border: 2px solid #475569;
    }

</head>
<body class="bg-slate-100 min-h-screen">

<!-- AUTH OVERLAY -->

        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">

        </svg>
      </div>
      <div>
        <h1 class="font-bold text-slate-900">SurgiCheck</h1>

    <h2 class="text-base font-bold text-slate-800 mb-4">Klinisyen Girişi Gerekli</h2>

</div>

  // ─── DURUM ────────────────────────────────────────────────────────────────────
  let mevcutVaka = null;
  let mevcutFlaglar = [];

  // ─── AUTH ─────────────────────────────────────────────────────────────────────
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("authOverlay").classList.add("hidden");
      document.getElementById("mainApp").classList.remove("hidden");
      const params = new URLSearchParams(window.location.search);
      const caseId = params.get("caseId");
      if (caseId) {
        vakaYukle(caseId);
      } else {
        document.getElementById("lookupSection").classList.remove("hidden");
      }
    }
  });

  document.getElementById("loginBtn").addEventListener("click", async () => {
    const email = document.getElementById("authEmail").value.trim();
    const password = document.getElementById("authPassword").value;
    const btn = document.getElementById("loginBtn");
    const errEl = document.getElementById("authError");
    btn.textContent = "Giriş yapılıyor...";
    btn.disabled = true;
    errEl.classList.add("hidden");
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (e) {
      errEl.textContent = e.code === "auth/invalid-credential" ? "E-posta veya şifre hatalı." : e.message;
      errEl.classList.remove("hidden");
      btn.textContent = "Giriş Yap";
      btn.disabled = false;
    }
  });

  document.getElementById("authPassword").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("loginBtn").click();
  });

  // ─── VAKA YÜKLEME ─────────────────────────────────────────────────────────────
  document.getElementById("loadCaseBtn").addEventListener("click", () => {
    const id = document.getElementById("caseIdInput").value.trim();
    if (id) vakaYukle(id);
  });
  document.getElementById("caseIdInput").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("loadCaseBtn").click();
  });
  document.getElementById("retryBtn").addEventListener("click", () => {
    document.getElementById("errorSection").classList.add("hidden");
    document.getElementById("lookupSection").classList.remove("hidden");
  });

  async function vakaYukle(caseId) {
    document.getElementById("lookupSection").classList.add("hidden");
    document.getElementById("errorSection").classList.add("hidden");
    document.getElementById("consentDocument").classList.add("hidden");
    document.getElementById("navButtons").classList.add("hidden");
    document.getElementById("loadingSection").classList.remove("hidden");
    try {
      const snap = await getDoc(doc(db, "cases", caseId));
      if (!snap.exists()) throw new Error("Girilen ID'ye ait vaka bulunamadı.");
      mevcutVaka = { id: caseId, ...snap.data() };
      mevcutFlaglar = flagHesapla(mevcutVaka);
      document.getElementById("loadingSection").classList.add("hidden");
      formuOlustur();
      document.getElementById("consentDocument").classList.remove("hidden");
      document.getElementById("navButtons").classList.remove("hidden");
    } catch (e) {
      document.getElementById("loadingSection").classList.add("hidden");
      document.getElementById("errorMsg").textContent = e.message || "Vaka yüklenirken hata oluştu.";
      document.getElementById("errorSection").classList.remove("hidden");
    }
  }

  // ─── FLAG HESAPLAMA (clinician.html ile senkron) ──────────────────────────────
  function flagHesapla(vaka, ezgecmeler = {}) {
    const flaglar = [];
    try {
      const r = vaka?.risks ?? {};
      const bmi = ezgecmeler.bmi ?? vaka?.anthropometrics?.bmi ?? null;
      const proc = vaka?.procedure?.name ?? "";
      const asa = ezgecmeler.asa ?? vaka?.clinician?.asa ?? null;
      const sigara = ezgecmeler.smokingVerified ?? vaka?.clinician?.smokingVerified ?? null;
      const antikoag = ezgecmeler.anticoagVerified ?? vaka?.clinician?.anticoagVerified ?? null;

      if (asa === "4") flaglar.push({ type: "HARD", key: "asa4" });
      if (r.activeMalignancy) flaglar.push({ type: "HARD", key: "malignancy" });
      if (r.dvt) flaglar.push({ type: "HARD", key: "dvt" });
      if (antikoag === "active") {
        flaglar.push({ type: "HARD", key: "anticoag_active" });
      } else if (!antikoag && (r.medBloodThinners || r.anticoagulant)) {
        flaglar.push({ type: "VERIFY", key: "anticoag_verify" });
      }
      if (r.medGlp1) flaglar.push({ type: "HARD", key: "med_glp1" });
      if (r.medSglt2) flaglar.push({ type: "HARD", key: "med_sglt2" });
      if (r.sickleCell) flaglar.push({ type: "HARD", key: "sickle_cell" });
      if (r.anestheticReaction) flaglar.push({ type: "HARD", key: "anesthetic_reaction" });

      const yuksekBmiProsedurler = ["Tummy Tuck", "BBL", "Liposuction", "Meme Küçültme"];
      const bmiProsedur = yuksekBmiProsedurler.some(p => proc.includes(p));
      if (bmi !== null) {
        if (bmi >= 40 && bmiProsedur) flaglar.push({ type: "HARD", key: "bmi40" });
        else if (bmi >= 35 && bmiProsedur) flaglar.push({ type: "SOFT", key: "bmi35" });
      }

      if (r.medOcp) {
        const dvtProsedurler = ["Tummy Tuck", "BBL", "Liposuction", "Breast Lift", "Meme Küçültme"];
        if (dvtProsedurler.some(p => proc.includes(p))) {
          flaglar.push({ type: "SOFT", key: "med_ocp_dvt" });
        } else {
          flaglar.push({ type: "SOFT", key: "med_ocp" });
        }
      }

      if (sigara === "active") {
        flaglar.push({ type: "SOFT", key: "smoking_active" });
      } else if (!sigara && r.smoking === "active") {
        flaglar.push({ type: "SOFT", key: "smoking_active" });
      }

      if (r.medAcne) flaglar.push({ type: "SOFT", key: "med_acne" });
      if (r.medPsych) flaglar.push({ type: "SOFT", key: "med_psych" });
      if (r.medSteroid) flaglar.push({ type: "VERIFY", key: "med_steroid" });
      if (r.medSglt2) { /* already handled */ }
      if (r.medNsaid) flaglar.push({ type: "SOFT", key: "med_nsaid" });
      if (r.medSupplements) flaglar.push({ type: "VERIFY", key: "med_supplements" });
      if (r.keloid) flaglar.push({ type: "SOFT", key: "keloid" });
      if (r.csection && proc === "Tummy Tuck") flaglar.push({ type: "SOFT", key: "csection" });
      if (vaka?.procedure?.revision) flaglar.push({ type: "SOFT", key: "revision" });
      if (r.hiv) flaglar.push({ type: "VERIFY", key: "hiv" });
      if (r.hepatitis) flaglar.push({ type: "VERIFY", key: "hepatitis" });
      if (r.heartMurmur) flaglar.push({ type: "VERIFY", key: "heart_murmur" });
      if (r.shortnessOfBreath) flaglar.push({ type: "VERIFY", key: "shortness_of_breath" });
      if (r.thalassemia) flaglar.push({ type: "VERIFY", key: "thalassemia" });
      if (r.anemia) flaglar.push({ type: "VERIFY", key: "anemia" });
      if (r.asthma) flaglar.push({ type: "SOFT", key: "asthma" });
      if (r.thyroid) flaglar.push({ type: "SOFT", key: "thyroid" });
      if (r.psychiatricDisorder) flaglar.push({ type: "SOFT", key: "psych_disorder" });
      if (r.sickleCellTrait) flaglar.push({ type: "SOFT", key: "sickle_cell_trait" });
      if (r.bloodTransfusion) flaglar.push({ type: "SOFT", key: "blood_transfusion" });
      if (r.medAllergy) flaglar.push({ type: "VERIFY", key: "med_allergy" });
    } catch (e) {}
    return flaglar;
  }

      el.classList.add("text-sm", "text-slate-700", "leading-relaxed");
    });
    document.querySelectorAll(".metin.liste").forEach(el => {
      el.classList.add("space-y-1");
      el.querySelectorAll("li").forEach(li => {
        li.className = "flex items-start gap-2 before:content-['•'] before:text-slate-400 before:flex-shrink-0 before:mt-0.5";
      });
    });
    document.querySelectorAll(".etiket").forEach(el => {
      el.className = "block text-xs font-semibold text-slate-600 mb-1";
    });
    document.querySelectorAll(".alan").forEach(el => {
      el.className = (el.className || "") + " w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black bg-white";
    });

    // İmza canvas'larını başlat
    setTimeout(() => {
      imzaCanvasBaslat("hastaImzaCanvas");
      imzaCanvasBaslat("hekimImzaCanvas");
    }, 50);

    // Temizle butonları
    document.querySelectorAll("[data-temizle]").forEach(btn => {
      btn.addEventListener("click", () => imzaTemizle(btn.dataset.temizle));
    });
  }

  // ─── İMZA CANVAS ─────────────────────────────────────────────────────────────
  function imzaCanvasBaslat(canvasId) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    canvas.width = canvas.offsetWidth || 600;
    const ctx = canvas.getContext("2d");
    ctx.strokeStyle = "#1e293b";
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    let ciziyorum = false, sonX = 0, sonY = 0;

    function konum(e) {
      const r = canvas.getBoundingClientRect();
      const sx = canvas.width / r.width, sy = canvas.height / r.height;
      const src = e.touches ? e.touches[0] : e;
      return { x: (src.clientX - r.left) * sx, y: (src.clientY - r.top) * sy };
    }

    canvas.addEventListener("mousedown", e => {
      ciziyorum = true;
      const p = konum(e); sonX = p.x; sonY = p.y;
      canvas.classList.add("has-sig");
    });
    canvas.addEventListener("mousemove", e => {
      if (!ciziyorum) return;
      const p = konum(e);
      ctx.beginPath(); ctx.moveTo(sonX, sonY); ctx.lineTo(p.x, p.y); ctx.stroke();
      sonX = p.x; sonY = p.y;
    });
    canvas.addEventListener("mouseup", () => { ciziyorum = false; });
    canvas.addEventListener("mouseleave", () => { ciziyorum = false; });

    canvas.addEventListener("touchstart", e => {
      e.preventDefault(); ciziyorum = true;
      const p = konum(e); sonX = p.x; sonY = p.y;
      canvas.classList.add("has-sig");
    }, { passive: false });
    canvas.addEventListener("touchmove", e => {
      e.preventDefault();
      if (!ciziyorum) return;
      const p = konum(e);
      ctx.beginPath(); ctx.moveTo(sonX, sonY); ctx.lineTo(p.x, p.y); ctx.stroke();
      sonX = p.x; sonY = p.y;
    }, { passive: false });
    canvas.addEventListener("touchend", () => { ciziyorum = false; });
  }

  function imzaTemizle(canvasId) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
    canvas.classList.remove("has-sig");
  }

  // ─── ONAM KAYDET ─────────────────────────────────────────────────────────────
  document.getElementById("saveConsentBtn").addEventListener("click", async () => {
    if (!mevcutVaka) return;
    const btn = document.getElementById("saveConsentBtn");

    const hastaAd = document.getElementById("hastaAd")?.value.trim();
    const hekimAd = document.getElementById("hekimAd")?.value.trim();
    if (!hastaAd) { alert("Lütfen hasta adını giriniz."); return; }
    if (!hekimAd) { alert("Lütfen hekim adını giriniz."); return; }

    const onaylar = document.querySelectorAll("#onayListesi input[type=checkbox]");
    const isaretlenmemis = Array.from(onaylar).filter(cb => !cb.checked);
    if (isaretlenmemis.length > 0) {
      alert("Lütfen tüm onay gerektiren maddeleri işaretleyiniz.");
      return;
    }

    const onayliMaddeler = Array.from(onaylar).map(cb => cb.dataset.etiket);
    const hastaImza = document.getElementById("hastaImzaCanvas")?.toDataURL("image/png") ?? null;
    const hekimImza = document.getElementById("hekimImzaCanvas")?.toDataURL("image/png") ?? null;
    const notlar = document.getElementById("hastaNotlari")?.value.trim() ?? "";

    const orijinalMetin = btn.innerHTML;
    btn.textContent = "Kaydediliyor...";
    btn.disabled = true;

    try {
      const onamRef = await addDoc(collection(db, "consents"), {
        caseId: mevcutVaka.id,
        procedureName: mevcutVaka.procedure?.name ?? "",
        patientName: hastaAd,
        patientNationalId: document.getElementById("hastaTc")?.value.trim() ?? "",
        witnessName: document.getElementById("tanikAd")?.value.trim() ?? "",
        clinicianName: hekimAd,
        diplomaNo: document.getElementById("diplomaNo")?.value.trim() ?? "",
        patientSignature: hastaImza,
        clinicianSignature: hekimImza,
        acknowledgedItems: onayliMaddeler,
        patientNotes: notlar,
        flagKeys: mevcutFlaglar.map(f => f.key),
        signedAt: serverTimestamp(),
        createdAt: serverTimestamp()
      });

      await updateDoc(doc(db, "cases", mevcutVaka.id), {
        consentSigned: true,
        consentId: onamRef.id,
        updatedAt: serverTimestamp()
      });

      const toast = document.getElementById("successToast");
      toast.classList.remove("hidden");
      setTimeout(() => toast.classList.add("hidden"), 4000);

      btn.textContent = "✓ Kaydedildi";
      btn.classList.remove("bg-emerald-600", "hover:bg-emerald-700");
      btn.classList.add("bg-slate-400", "cursor-default");
    } catch (e) {
      alert("Kaydetme hatası: " + e.message);
      btn.innerHTML = orijinalMetin;
      btn.disabled = false;
    }
  });

  document.getElementById("printBtn").addEventListener("click", () => window.print());

  // ─── YARDIMCI ─────────────────────────────────────────────────────────────────
  function esc(str) {
    if (!str) return "";
    return String(str)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }
</script>
